name: Vercel Re-commit

on:
  push:
    branches: [main]

jobs:
  recommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check last commit author and re-commit if needed
        run: |
          AUTHOR_NAME=$(git log -1 --format='%an')
          AUTHOR_EMAIL=$(git log -1 --format='%ae')

          echo "Last commit by: $AUTHOR_NAME <$AUTHOR_EMAIL>"

          if [ "$AUTHOR_NAME" = "20SB" ] || [ "$AUTHOR_EMAIL" = "subhabiswal20@gmail.com" ]; then
            echo "Commit is from the owner. No action needed."
          else
            echo "Commit is from another user. Creating re-commit for Vercel..."
            git config user.name "20SB"
            git config user.email "subhabiswal20@gmail.com"
            git commit --allow-empty -m "chore: re-commit for Vercel deployment [skip ci]"
            git push
          fi
